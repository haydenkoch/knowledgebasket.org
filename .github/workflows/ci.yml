name: CI

on:
  push:
    branches:
      - main
      - master
      - staging
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
      - '.cursor/**'
      - '.vscode/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
      - '.cursor/**'
      - '.vscode/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static (${{ matrix.task }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      PUBLIC_ASSET_BASE_URL: http://127.0.0.1:4273/assets
      MEILISEARCH_HOST: http://127.0.0.1:7700
      MEILISEARCH_API_KEY: kbdev
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
      CI_GIT_BASE_REF: ${{ github.base_ref }}
      CI_GIT_BASE_SHA: ${{ github.event.before }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: typecheck
            run: pnpm check
          - task: lint
            run: pnpm lint:ci
          - task: build
            run: pnpm build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify committed migrations
        if: matrix.task == 'typecheck'
        run: node scripts/check-migrations-ci.mjs

      - name: Run ${{ matrix.task }}
        run: ${{ matrix.run }}

      - name: Upload build artifact
        if: matrix.task == 'build'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-build
          path: build
          if-no-files-found: error
          retention-days: 7

  vitest-unit:
    name: Vitest Unit (Shard ${{ matrix.shard }} of 3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      MEILISEARCH_HOST: http://127.0.0.1:7700
      MEILISEARCH_API_KEY: kbdev
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        env:
          CI_SHARD_INDEX: ${{ matrix.shard }}
          CI_SHARD_TOTAL: 3
        run: pnpm test:unit:ci

  vitest-http:
    name: Vitest HTTP (Shard ${{ matrix.shard }} of 2)
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      MEILISEARCH_HOST: ''
      MEILISEARCH_API_KEY: ''
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
      CI_USE_BUILD_OUTPUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kb
          POSTGRES_PASSWORD: kbdev
          POSTGRES_DB: kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb -d kb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-build
          path: build

      - name: Wait for Postgres
        run: |
          node <<'EOF'
          import net from 'node:net';

          const started = Date.now();
          while (Date.now() - started < 60000) {
            try {
              await new Promise((resolve, reject) => {
                const socket = net.createConnection({ host: '127.0.0.1', port: 5432 }, () => {
                  socket.end();
                  resolve();
                });
                socket.on('error', reject);
              });
              process.exit(0);
            } catch {}

            await new Promise((resolve) => setTimeout(resolve, 1000));
          }

          throw new Error('Timed out waiting for Postgres');
          EOF

      - name: Apply database schema
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed:ci

      - name: HTTP contract tests
        env:
          CI_SHARD_INDEX: ${{ matrix.shard }}
          CI_SHARD_TOTAL: 2
        run: pnpm test:http:ci

  search-indexed:
    name: Search Indexed
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      MEILISEARCH_HOST: http://127.0.0.1:7700
      MEILISEARCH_API_KEY: kbdev
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
      CI_USE_BUILD_OUTPUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kb
          POSTGRES_PASSWORD: kbdev
          POSTGRES_DB: kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb -d kb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.15
        env:
          MEILI_MASTER_KEY: kbdev
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -fsS http://127.0.0.1:7700/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-build
          path: build

      - name: Wait for services
        run: |
          node <<'EOF'
          import net from 'node:net';

          const waitForPort = (port) =>
            new Promise((resolve, reject) => {
              const started = Date.now();
              const attempt = () => {
                const socket = net.createConnection({ host: '127.0.0.1', port }, () => {
                  socket.end();
                  resolve();
                });
                socket.on('error', () => {
                  socket.destroy();
                  if (Date.now() - started > 60000) reject(new Error(`Timed out waiting for port ${port}`));
                  else setTimeout(attempt, 1000);
                });
              };
              attempt();
            });

          await waitForPort(5432);
          const started = Date.now();
          while (true) {
            try {
              const response = await fetch('http://127.0.0.1:7700/health');
              if (response.ok) break;
            } catch {}
            if (Date.now() - started > 60000) {
              throw new Error('Timed out waiting for Meilisearch');
            }
            await new Promise((resolve) => setTimeout(resolve, 1000));
          }
          EOF

      - name: Apply database schema
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed:ci

      - name: Search contract (indexed)
        run: pnpm test:search:indexed

  search-degraded:
    name: Search Degraded
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      MEILISEARCH_HOST: ''
      MEILISEARCH_API_KEY: ''
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
      CI_USE_BUILD_OUTPUT: '1'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kb
          POSTGRES_PASSWORD: kbdev
          POSTGRES_DB: kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb -d kb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-build
          path: build

      - name: Wait for Postgres
        run: |
          node <<'EOF'
          import net from 'node:net';

          const started = Date.now();
          while (Date.now() - started < 60000) {
            try {
              await new Promise((resolve, reject) => {
                const socket = net.createConnection({ host: '127.0.0.1', port: 5432 }, () => {
                  socket.end();
                  resolve();
                });
                socket.on('error', reject);
              });
              process.exit(0);
            } catch {}

            await new Promise((resolve) => setTimeout(resolve, 1000));
          }

          throw new Error('Timed out waiting for Postgres');
          EOF

      - name: Apply database schema
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed:ci

      - name: Search contract (degraded)
        run: pnpm test:search:degraded

  e2e:
    name: E2E (${{ matrix.project }})
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project:
          - desktop-chromium
          - mobile-chromium
    env:
      DATABASE_URL: postgres://kb:kbdev@127.0.0.1:5432/kb
      BETTER_AUTH_SECRET: 12345678901234567890123456789012
      ORIGIN: http://127.0.0.1:4273
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: 1025
      SMTP_FROM: '"Knowledge Basket" <noreply@example.com>'
      MEILISEARCH_HOST: ''
      MEILISEARCH_API_KEY: ''
      REINDEX_SECRET: ci-reindex-secret-1234567890123456
      SOURCE_OPS_SECRET: ci-source-ops-secret-1234567890
      CI_USE_BUILD_OUTPUT: '1'
      PLAYWRIGHT_PROJECT: ${{ matrix.project }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kb
          POSTGRES_PASSWORD: kbdev
          POSTGRES_DB: kb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb -d kb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: app-build
          path: build

      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for Postgres
        run: |
          node <<'EOF'
          import net from 'node:net';

          const started = Date.now();
          while (Date.now() - started < 60000) {
            try {
              await new Promise((resolve, reject) => {
                const socket = net.createConnection({ host: '127.0.0.1', port: 5432 }, () => {
                  socket.end();
                  resolve();
                });
                socket.on('error', reject);
              });
              process.exit(0);
            } catch {}

            await new Promise((resolve) => setTimeout(resolve, 1000));
          }

          throw new Error('Timed out waiting for Postgres');
          EOF

      - name: Apply database schema
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed:ci

      - name: E2E
        run: pnpm test:e2e:ci

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-artifacts-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
